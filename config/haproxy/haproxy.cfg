global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 4096
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    timeout connect 5000
    timeout client 50000
    timeout server 50000
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# Stats page (optional - enable with password)
# listen stats
#     bind *:8404
#     stats enable
#     stats uri /stats
#     stats refresh 30s
#     stats auth admin:password

# HTTPS frontend - SSL termination
frontend https_in
    bind *:443 ssl crt /etc/haproxy/yha.pem alpn h2,http/1.1
    mode http
    option httplog
    option forwardfor
    option http-server-close
    
    # ACL for WebSocket upgrade
    acl is_websocket hdr(Upgrade) -i websocket
    acl is_vmess path_beg /vmess
    acl is_vless path_beg /vless
    acl is_trojan path_beg /trojan
    acl is_shadowsocks path_beg /shadowsocks
    acl is_ws path_beg /ws
    
    # Route WebSocket traffic to Xray backend
    use_backend xray_ws if is_websocket (is_vmess or is_vless or is_trojan or is_shadowsocks or is_ws)
    
    # Default backend for regular HTTP
    default_backend nginx_http

# HTTP frontend - redirect to HTTPS
frontend http_in
    bind *:80
    mode http
    option httplog
    redirect scheme https code 301 if !{ ssl_fc }

# Xray WebSocket backend
backend xray_ws
    mode http
    option httpchk GET /health
    server xray1 127.0.0.1:8080 check inter 2000 rise 2 fall 3

# Nginx HTTP backend
backend nginx_http
    mode http
    option httpchk GET /
    server nginx1 127.0.0.1:8081 check inter 2000 rise 2 fall 3

